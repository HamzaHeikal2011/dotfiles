# Only display the OSD on the currently focused monitor
$osdclient = swayosd-client --monitor "$(~/.dotfiles/bin/hyprland-monitor-focused)"

# Laptop multimedia keys for volume and LCD brightness (with OSD)
bindeld = ,XF86AudioRaiseVolume, Volume up, exec, $osdclient --output-volume raise
bindeld = ,XF86AudioLowerVolume, Volume down, exec, $osdclient --output-volume lower
bindeld = ,XF86AudioMute, Mute, exec, $osdclient --output-volume mute-toggle
bindeld = ,XF86AudioMicMute, Mute microphone, exec, ~/.dotfiles/bin/audio-input-mute
bindeld = ,XF86MonBrightnessUp, Brightness up, exec, ~/.dotfiles/bin/brightness-display +5%
bindeld = ,XF86MonBrightnessDown, Brightness down, exec, ~/.dotfiles/bin/brightness-display 5%-
bindeld = ,XF86KbdBrightnessUp, Keyboard brightness up, exec, ~/.dotfiles/bin/brightness-keyboard up
bindeld = ,XF86KbdBrightnessDown, Keyboard brightness down, exec, ~/.dotfiles/bin/brightness-keyboard down
bindld = ,XF86KbdLightOnOff, Keyboard backlight cycle, exec, ~/.dotfiles/bin/brightness-keyboard cycle

# Precise 1% multimedia adjustments with Alt modifier
bindeld = ALT, XF86AudioRaiseVolume, Volume up precise, exec, $osdclient --output-volume +1
bindeld = ALT, XF86AudioLowerVolume, Volume down precise, exec, $osdclient --output-volume -1
bindeld = ALT, XF86MonBrightnessUp, Brightness up precise, exec, ~/.dotfiles/bin/brightness-display +1%
bindeld = ALT, XF86MonBrightnessDown, Brightness down precise, exec, ~/.dotfiles/bin/brightness-display 1%-

# Requires playerctl
bindld = , XF86AudioNext, Next track, exec, $osdclient --playerctl next
bindld = , XF86AudioPause, Pause, exec, $osdclient --playerctl play-pause
bindld = , XF86AudioPlay, Play, exec, $osdclient --playerctl play-pause
bindld = , XF86AudioPrev, Previous track, exec, $osdclient --playerctl previous

# Switch audio output with Super + Mute
bindld = SUPER, XF86AudioMute, Switch audio output, exec, ~/.dotfiles/bin/audio-output-switch
# Copy / Paste
bindd = SUPER, C, Universal copy, sendshortcut, CTRL, Insert, activewindow
bindd = SUPER, V, Universal paste, sendshortcut, SHIFT, Insert, activewindow
bindd = SUPER, X, Universal cut, sendshortcut, CTRL, X, activewindow
bindd = SUPER CTRL, V, Clipboard manager, exec, rofi -modi "clipboard:greenclip print" -show clipboard -run-command '{cmd}'
# Close windows
bindd = SUPER, Q, Close window, killactive

# Control tiling
bindd = SUPER, P, Pseudo window, pseudo, # dwindle
bindd = SUPER, T, Toggle window floating/tiling, togglefloating,
bindd = SUPER, F, Full screen, fullscreen, 0
bindd = SUPER CTRL, F, Tiled full screen, fullscreenstate, 0 2
bindd = SUPER ALT, F, Full width, fullscreen, 1

# Move focus with SUPER + arrow keys
bindd = SUPER, H, Move window focus left, movefocus, l
bindd = SUPER, J, Move window focus down, movefocus, d
bindd = SUPER, K, Move window focus up, movefocus, u
bindd = SUPER, L, Move window focus right, movefocus, r

# Switch workspaces with SUPER + [1-9; 0]
bindd = SUPER, code:10, Switch to workspace 1, workspace, 1
bindd = SUPER, code:11, Switch to workspace 2, workspace, 2
bindd = SUPER, code:12, Switch to workspace 3, workspace, 3
bindd = SUPER, code:13, Switch to workspace 4, workspace, 4
bindd = SUPER, code:14, Switch to workspace 5, workspace, 5
bindd = SUPER, code:15, Switch to workspace 6, workspace, 6
bindd = SUPER, code:16, Switch to workspace 7, workspace, 7
bindd = SUPER, code:17, Switch to workspace 8, workspace, 8
bindd = SUPER, code:18, Switch to workspace 9, workspace, 9
bindd = SUPER, code:19, Switch to workspace 10, workspace, 10

# Move active window to a workspace with SUPER + SHIFT + [1-9; 0]
bindd = SUPER SHIFT, code:10, Move window to workspace 1, movetoworkspace, 1
bindd = SUPER SHIFT, code:11, Move window to workspace 2, movetoworkspace, 2
bindd = SUPER SHIFT, code:12, Move window to workspace 3, movetoworkspace, 3
bindd = SUPER SHIFT, code:13, Move window to workspace 4, movetoworkspace, 4
bindd = SUPER SHIFT, code:14, Move window to workspace 5, movetoworkspace, 5
bindd = SUPER SHIFT, code:15, Move window to workspace 6, movetoworkspace, 6
bindd = SUPER SHIFT, code:16, Move window to workspace 7, movetoworkspace, 7
bindd = SUPER SHIFT, code:17, Move window to workspace 8, movetoworkspace, 8
bindd = SUPER SHIFT, code:18, Move window to workspace 9, movetoworkspace, 9
bindd = SUPER SHIFT, code:19, Move window to workspace 10, movetoworkspace, 10

# Move active window silently to a workspace with SUPER + SHIFT + ALT + [1-9; 0]
bindd = SUPER SHIFT ALT, code:10, Move window silently to workspace 1, movetoworkspacesilent, 1
bindd = SUPER SHIFT ALT, code:11, Move window silently to workspace 2, movetoworkspacesilent, 2
bindd = SUPER SHIFT ALT, code:12, Move window silently to workspace 3, movetoworkspacesilent, 3
bindd = SUPER SHIFT ALT, code:13, Move window silently to workspace 4, movetoworkspacesilent, 4
bindd = SUPER SHIFT ALT, code:14, Move window silently to workspace 5, movetoworkspacesilent, 5
bindd = SUPER SHIFT ALT, code:15, Move window silently to workspace 6, movetoworkspacesilent, 6
bindd = SUPER SHIFT ALT, code:16, Move window silently to workspace 7, movetoworkspacesilent, 7
bindd = SUPER SHIFT ALT, code:17, Move window silently to workspace 8, movetoworkspacesilent, 8
bindd = SUPER SHIFT ALT, code:18, Move window silently to workspace 9, movetoworkspacesilent, 9
bindd = SUPER SHIFT ALT, code:19, Move window silently to workspace 10, movetoworkspacesilent, 10

# Control scratchpad
bindd = SUPER, S, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = SUPER ALT, S, Move window to scratchpad, movetoworkspacesilent, special:scratchpad

# TAB between workspaces
bindd = SUPER, TAB, Next workspace, workspace, e+1
bindd = SUPER SHIFT, TAB, Previous workspace, workspace, e-1
bindd = SUPER CTRL, TAB, Former workspace, workspace, previous

# Move workspaces to other monitors
bindd = SUPER SHIFT ALT, H, Move workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = SUPER SHIFT ALT, J, Move workspace to down monitor, movecurrentworkspacetomonitor, d
bindd = SUPER SHIFT ALT, K, Move workspace to up monitor, movecurrentworkspacetomonitor, u
bindd = SUPER SHIFT ALT, L, Move workspace to right monitor, movecurrentworkspacetomonitor, r

# Swap active window with the one next to it with SUPER + SHIFT + arrow keys
bindd = SUPER SHIFT, H, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT, J, Swap window down, swapwindow, d
bindd = SUPER SHIFT, K, Swap window up, swapwindow, u
bindd = SUPER SHIFT, L, Swap window to the right, swapwindow, r

# Cycle through applications on active workspace
bindd = ALT, TAB, Cycle to next window, cyclenext
bindd = ALT SHIFT, TAB, Cycle to prev window, cyclenext, prev
bindd = ALT, TAB, Reveal active window on top, bringactivetotop
bindd = ALT SHIFT, TAB, Reveal active window on top, bringactivetotop

# Resize active window
bindd = SUPER, code:20, Expand window left, resizeactive, -100 0    # - key
bindd = SUPER, code:21, Shrink window left, resizeactive, 100 0     # = key
bindd = SUPER SHIFT, code:20, Shrink window up, resizeactive, 0 -100
bindd = SUPER SHIFT, code:21, Expand window down, resizeactive, 0 100

# Scroll through existing workspaces with SUPER + scroll
bindd = SUPER, mouse_down, Scroll active workspace forward, workspace, e+1
bindd = SUPER, mouse_up, Scroll active workspace backward, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindmd = SUPER, mouse:272, Move window, movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow

# Toggle groups
bindd = SUPER, G, Toggle window grouping, togglegroup
bindd = SUPER ALT, G, Move active window out of group, moveoutofgroup

# Join groups
bindd = SUPER ALT, H, Move window to group on left, moveintogroup, l
bindd = SUPER ALT, J, Move window to group on bottom, moveintogroup, d
bindd = SUPER ALT, K, Move window to group on top, moveintogroup, u
bindd = SUPER ALT, L, Move window to group on right, moveintogroup, r

# Navigate a single set of grouped windows
bindd = SUPER ALT, TAB, Next window in group, changegroupactive, f
bindd = SUPER ALT SHIFT, TAB, Previous window in group, changegroupactive, b

# Window navigation for grouped windows
bindd = SUPER CTRL, H, Move grouped window focus left, changegroupactive, b
bindd = SUPER CTRL, L, Move grouped window focus right, changegroupactive, f

# Scroll through a set of grouped windows with SUPER + ALT + scroll
bindd = SUPER ALT, mouse_down, Next window in group, changegroupactive, f
bindd = SUPER ALT, mouse_up, Previous window in group, changegroupactive, b

# Activate window in a group by number
bindd = SUPER ALT, code:10, Switch to group window 1, changegroupactive, 1
bindd = SUPER ALT, code:11, Switch to group window 2, changegroupactive, 2
bindd = SUPER ALT, code:12, Switch to group window 3, changegroupactive, 3
bindd = SUPER ALT, code:13, Switch to group window 4, changegroupactive, 4
bindd = SUPER ALT, code:14, Switch to group window 5, changegroupactive, 5
# Menus
bindd = SUPER, SPACE, Launch apps, exec, rofi -show drun
bindd = SUPER CTRL, E, Emoji picker, exec, ~/.dotfiles/bin/launch-walker -m symbols
bindd = SUPER CTRL, C, Capture menu, exec, ~/.dotfiles/bin/menu capture
bindd = SUPER CTRL, O, Toggle menu, exec, ~/.dotfiles/bin/menu toggle
bindd = SUPER ALT, SPACE, Main menu, exec, ~/.dotfiles/bin/menu
bindd = SUPER SHIFT, code:201, Main menu, exec, ~/.dotfiles/bin/menu
bindd = SUPER, ESCAPE, System menu, exec, ~/.dotfiles/bin/menu system
bindld = , XF86PowerOff, Power menu, exec, ~/.dotfiles/bin/menu system
bindd = SUPER, PERIOD, Show key bindings, exec, ~/.dotfiles/bin/menu-keybindings
bindd = , XF86Calculator, Calculator, exec, gnome-calculator

# Aesthetics
bindd = SUPER SHIFT, SPACE, Toggle top bar, exec, ~/.dotfiles/bin/toggle-waybar
bindd = SUPER CTRL, SPACE, Theme background menu, exec, ~/.dotfiles/bin/menu background
bindd = SUPER, BACKSPACE, Toggle window transparency, exec, ~/.dotfiles/bin/hyprland-active-window-transparency-toggle

# Notifications
bindd = SUPER, COMMA, Dismiss last notification, exec, swaync-client --close-latest
bindd = SUPER SHIFT, COMMA, Dismiss all notifications, exec, swaync-client --close-all
bindd = SUPER CTRL, COMMA, Toggle silencing notifications, exec, swaync-client -d
bindd = SUPER CTRL ALT, COMMA, Toggle Notification Panel, exec, swaync-client -t

# Toggles
bindd = SUPER CTRL, I, Toggle locking on idle, exec, ~/.dotfiles/bin/toggle-idle
bindd = SUPER CTRL, N, Toggle nightlight, exec, ~/.dotfiles/bin/toggle-nightlight

# Captures
bindd = , PRINT, Screenshot, exec, ~/.dotfiles/bin/capture-screenshot
bindd = ALT, PRINT, Screenrecording, exec, ~/.dotfiles/bin/menu screenrecord
bindd = SUPER, PRINT, Color picker, exec, pkill hyprpicker || hyprpicker -a

# File sharing
bindd = SUPER CTRL, S, Share, exec, ~/.dotfiles/bin/menu share

# Control panels
bindd = SUPER CTRL, A, Audio controls, exec, ~/.dotfiles/bin/launch-audio
bindd = SUPER CTRL, B, Bluetooth controls, exec, ~/.dotfiles/bin/launch-bluetooth
bindd = SUPER CTRL, W, Wifi controls, exec, ~/.dotfiles/bin/launch-wifi
bindd = SUPER CTRL, T, Activity, exec, ~/.dotfiles/bin/launch-tui btop

# Dictation
bindd = SUPER CTRL, X, Toggle dictation, exec, voxtype record toggle

# Zoom
bindd = SUPER CTRL, Z, Zoom in, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float + 1')
bindd = SUPER CTRL ALT, Z, Reset zoom, exec, hyprctl keyword cursor:zoom_factor 1

# Lock system
bindd = SUPER CTRL, L, Lock system, exec, ~/.dotfiles/bin/system-lock
# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- ghostty +new-window
bindd = SUPER SHIFT, RETURN, Browser, exec, ~/.dotfiles/bin/launch-browser
bindd = SUPER SHIFT, F, File manager, exec, ~/.dotfiles/bin/launch-tui yazi
bindd = SUPER SHIFT, B, Browser, exec, ~/.dotfiles/bin/launch-browser
bindd = SUPER SHIFT, M, Music, exec, ~/.dotfiles/bin/launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, ~/.dotfiles/bin/launch-editor
bindd = SUPER SHIFT, D, Whiteboard, exec, ~/Desktop/appimages/drawy.AppImage
bindd = SUPER SHIFT, T, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password
bindd = SUPER SHIFT ALT, B, Browser (private), exec, ~/.dotfiles/bin/launch-browser --private
bindd = CTRL SHIFT, ESCAPE, Activity, exec, ~/.dotfiles/bin/launch-tui btop

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, C, Calendar, exec, ~/.dotfiles/bin/launch-webapp "https://calendar.notion.so"
bindd = SUPER SHIFT, E, Email, exec, ~/.dotfiles/bin/launch-webapp "https://mail.notion.so"
bindd = SUPER SHIFT, Y, YouTube, exec, ~/.dotfiles/bin/launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT, W, WhatsApp, exec, ~/.dotfiles/bin/launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://calendar.notion.so"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://mail.notion.so"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT, W, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"

