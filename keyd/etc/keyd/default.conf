[ids]
*

[settings]
# Stable timing for normal + fast typists
overload_tap_timeout = 200
overload_hold_timeout = 170

[main]

# Caps Lock: Ctrl when held, Esc when tapped
capslock = overload(control, esc)

# Space: Vim style navigation layer
space = overload(nav, space)

# Optional symbol layer (only if you want it)
rightalt = overload(symbol, rightalt)

# -----------------------
# NAVIGATION LAYER
# -----------------------
[nav]

h = left
j = down
k = up
l = right

u = mouse_scroll_up
d = mouse_scroll_down

y = mouse_scroll_left
o = mouse_scroll_right

i = home
o = end

n = backspace
m = delete


# -----------------------
# SYMBOL LAYER
# -----------------------
[symbol]

a = !
s = @
d = #
f = $
j = &
k = *
l = (
semicolon = )
